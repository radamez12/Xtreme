<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXXX - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow-x: hidden; }
        .neon-purple { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        .bg-purple { background: linear-gradient(90deg, #bc13fe, #8a2be2); }
        .nav-tab { font-size: 12px; font-weight: bold; color: #555; cursor: pointer; }
        .nav-active { color: #bc13fe; }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24 text-center">

    <header class="p-4 border-b border-white/5 sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-black italic neon-purple tracking-tighter">PIXXX</h1>
        <div id="display-status" class="text-[10px] text-yellow-500 font-bold mt-1 uppercase tracking-widest font-mono">Sistema Ativo</div>
    </header>

    <div id="tab-live" class="p-4 space-y-4">
        <div class="w-full h-96 bg-black rounded-[40px] border border-white/10 overflow-hidden relative shadow-2xl">
            <div id="video-container" class="w-full h-full"></div>
            <div class="absolute top-4 left-4 bg-red-600 px-2 py-0.5 rounded text-[10px] font-black uppercase">AO VIVO</div>
        </div>
        
        <input id="user-name-input" type="text" placeholder="Escolha seu apelido..." class="w-full bg-gray-900 p-4 rounded-2xl text-sm outline-none border border-white/5 text-center">
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="iniciarLive()" class="bg-purple p-4 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-purple-600/20 text-white">Abrir Câmera</button>
            <button onclick="entrarLive()" class="bg-gray-800 p-4 rounded-2xl font-bold text-xs border border-white/10 uppercase italic text-white">Entrar</button>
        </div>

        <div class="bg-gray-900/50 p-4 rounded-3xl border border-white/5 flex justify-between items-center mt-4">
            <div class="text-left">
                <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter">Saldo Modelo</p>
                <h3 class="text-xl font-black" id="modelo-saldo">R$ 0,00</h3>
            </div>
            <button onclick="alert('Saque mínimo de R$ 30,00')" class="bg-green-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white">Sacar PIX</button>
        </div>
    </div>

    <div id="tab-profile" class="hidden p-8 space-y-4">
        <div id="login-form">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 text-center">Gestão do Presidente</h2>
            <input id="adm-email" type="email" placeholder="E-mail" class="w-full bg-gray-900 p-4 rounded-xl text-sm outline-none border border-white/5 mb-2 text-center">
            <input id="adm-pass" type="password" placeholder="Senha" class="w-full bg-gray-900 p-4 rounded-xl text-sm outline-none border border-white/5 mb-4 text-center text-white">
            <button onclick="acessarPainel()" class="w-full bg-gray-800 p-4 rounded-xl text-xs font-black uppercase border border-white/5 text-white">Entrar no Painel</button>
        </div>
        
        <div id="president-dashboard" class="hidden mt-6 p-6 bg-purple rounded-[32px] text-left shadow-2xl">
            <p class="text-[10px] font-black uppercase opacity-60">Faturamento Real (25%)</p>
            <h2 class="text-4xl font-black">R$ 0,00</h2>
            <hr class="my-4 border-white/10">
            <p class="text-[10px] font-bold text-white uppercase font-mono">● MODO GHOST: ATIVADO</p>
            <p class="text-[9px] text-white/70 italic leading-tight mt-1">Agora você entra em qualquer live grátis.</p>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full max-w-md bg-black border-t border-white/5 flex justify-around p-3 z-50">
        <div onclick="showTab('live')" class="nav-tab nav-active" id="btn-live">🎥 LIVE</div>
        <div onclick="showTab('profile')" class="nav-tab" id="btn-profile">👤 PERFIL</div>
    </footer>

    <script>
        const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
        const appId = "58b921e58ceb4536b3bca7dd6a12bdba"; 
        const canal = "canal-pixxx";

        let isGhostMode = false;
        const MY_EMAIL = "radamez1228@gmail.com";
        const MY_PASS = "Ra@$926629";

        function showTab(id) {
            document.getElementById('tab-live').classList.add('hidden');
            document.getElementById('tab-profile').classList.add('hidden');
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('nav-active'));
            document.getElementById('btn-' + id).classList.add('nav-active');
        }

        function acessarPainel() {
            const e = document.getElementById('adm-email').value;
            const p = document.getElementById('adm-pass').value;
            if(e === MY_EMAIL && p === MY_PASS) {
                isGhostMode = true;
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('president-dashboard').classList.remove('hidden');
                document.getElementById('display-status').innerHTML = "PRESIDENTE: MODO GHOST";
                alert("Olá Presidente Radames!");
            } else { alert("Acesso Negado."); }
        }

        async function entrarLive() {
            const nome = document.getElementById('user-name-input').value;
            if(!nome) return alert("Digite um apelido!");
            client.setClientRole("audience");
            await client.join(appId, canal, null, null); 
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "video") user.videoTrack.play("video-container");
            });
            alert("Você entrou como: " + nome);
        }

        async function iniciarLive() {
            client.setClientRole("host");
            await client.join(appId, canal, null, null);
            const v = await AgoraRTC.createCameraVideoTrack();
            const a = await AgoraRTC.createMicrophoneAudioTrack();
            v.play("video-container");
            await client.publish([v, a]);
            alert("VOCÊ ESTÁ AO VIVO!");
        }
    </script>
</body>
</html>
