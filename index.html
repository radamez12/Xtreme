<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>PIXXX - Império Oficial</title>
    
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { padding: 15px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .neon-purple { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; font-weight: 900; }
        
        /* AJUSTE DE TELA PARA NÃO CORTAR */
        .aba-conteudo { display: none; padding: 15px; text-align: center; padding-bottom: 150px; }
        .aba-ativa { display: block !important; }
        
        footer { position: fixed; bottom: 0; width: 100%; max-width: 448px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; z-index: 1000; padding: 10px 0; padding-bottom: 25px; }
        .nav-tab { color: #555; font-size: 10px; font-weight: bold; text-align: center; flex: 1; cursor: pointer; }
        .nav-active { color: #bc13fe !important; }
        
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid #222; border-radius: 25px; padding: 15px; margin-bottom: 20px; overflow: hidden; }
        .blur-photo { filter: blur(25px); opacity: 0.5; transition: 0.5s; }
        .unlocked { filter: blur(0) !important; opacity: 1 !important; }
        
        .bg-purple { background: linear-gradient(90deg, #bc13fe, #8a2be2); color: white; border-radius: 15px; padding: 15px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        .btn-green { background: #28a745; color: white; border-radius: 12px; padding: 10px 20px; font-weight: bold; border: none; font-size: 10px; }
        
        input { background: #111; border: 1px solid #333; color: white; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .shop-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 10px; }
        .wheel { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #bc13fe; margin: 20px auto; background: #111; display: flex; align-items: center; justify-content: center; transition: 4s; }
    </style>

    <script>
        // NAVEGAÇÃO
        function mudarAba(id) {
            const abas = ['home', 'roulette', 'live', 'gems', 'gestao'];
            abas.forEach(a => {
                document.getElementById('tela-' + a).style.display = 'none';
                document.getElementById('btn-' + a).classList.remove('nav-active');
            });
            document.getElementById('tela-' + id).style.display = 'block';
            document.getElementById('btn-' + id).classList.add('nav-active');
            window.scrollTo(0,0);
        }

        // FUNÇÃO DO FEED (DESBLOQUEAR)
        function desbloquear(id) {
            const userGems = parseInt(document.getElementById('topo-saldo').innerText);
            if(userGems < 10) {
                alert("Você precisa de 10 Gems para ver esta foto!");
                mudarAba('gems');
            } else {
                document.getElementById('foto-'+id).classList.add('unlocked');
                document.getElementById('btn-unlock-'+id).style.display = 'none';
                alert("Conteúdo desbloqueado com sucesso!");
            }
        }
    </script>
</head>
<body class="max-w-md mx-auto min-h-screen">

    <header>
        <h1 class="text-2xl neon-purple italic">PIXXX</h1>
        <div style="color: #ffcc00; font-weight: bold; font-size: 12px;" id="topo-saldo">10 Gems</div>
    </header>

    <!-- TELA 1: FEED (AGORA FUNCIONA!) -->
    <div id="tela-home" class="aba-conteudo aba-ativa">
        <h3 style="font-size: 9px; color: #666; letter-spacing: 3px; margin-bottom: 20px; font-weight: 900;">FEED PRIVADO</h3>
        
        <!-- Post 1 -->
        <div class="glass">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; text-align: left;">
                <div style="width:30px; height:30px; border-radius:50%; background:#bc13fe;"></div>
                <span style="font-weight:bold; font-size:12px;">Mih_Vip 🔥</span>
            </div>
            <div style="position:relative; width:100%; height:300px; background:#000; border-radius:15px; overflow:hidden;">
                <img id="foto-1" src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=500" class="blur-photo" style="width:100%; height:100%; object-fit:cover;">
                <div id="btn-unlock-1" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
                    <button onclick="desbloquear(1)" class="bg-purple" style="width:auto; padding:10px 20px; font-size:10px;">🔓 LIBERAR FOTO (10 GEMS)</button>
                </div>
            </div>
        </div>

        <!-- Post 2 -->
        <div class="glass">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; text-align: left;">
                <div style="width:30px; height:30px; border-radius:50%; background:#00ff00;"></div>
                <span style="font-weight:bold; font-size:12px;">Letícia_Hot 🔞</span>
            </div>
            <div style="position:relative; width:100%; height:300px; background:#000; border-radius:15px; overflow:hidden;">
                <img id="foto-2" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=500" class="blur-photo" style="width:100%; height:100%; object-fit:cover;">
                <div id="btn-unlock-2" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
                    <button onclick="desbloquear(2)" class="bg-purple" style="width:auto; padding:10px 20px; font-size:10px;">🔓 LIBERAR VÍDEO (15 GEMS)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TELA 2: ROLETA -->
    <div id="tela-roulette" class="aba-conteudo">
        <h2 class="neon-purple">ROLETA DA SORTE</h2>
        <div id="wheel" class="wheel">5 | 30 | 250 | 10</div>
        <button onclick="alert('Giro iniciado!')" class="bg-purple">GIRAR (15 GEMS)</button>
    </div>

    <!-- TELA 3: LIVE -->
    <div id="tela-live" class="aba-conteudo">
        <div class="video-container" style="width:100%; height:300px; background:black; border-radius:30px; border:1px solid #333; overflow:hidden; margin-bottom:15px;">
            <div id="video-player" style="width:100%; height:100%;"></div>
        </div>
        <input id="nick" type="text" placeholder="Seu apelido...">
        <div style="display: grid; grid-template-cols: 1fr 1fr; gap: 8px;">
            <button onclick="alert('Câmera ON')" class="bg-purple" style="font-size:10px;">🎥 CÂMERA</button>
            <button onclick="alert('Modo Gamer ON')" class="bg-purple" style="background:#ff4500; font-size:10px;">🎮 JOGOS</button>
        </div>
    </div>

    <!-- TELA 4: GEMS (LOJA DE 5 EM 5) -->
    <div id="tela-gems" class="aba-conteudo">
        <h2 class="neon-purple">RECARREGAR GEMS</h2>
        <div class="shop-grid" id="loja-itens">
            <script>
                [5, 10, 15, 20, 30, 40, 50, 100].forEach(v => {
                    document.write(`<div onclick="document.getElementById('pix-area').style.display='block'" class="glass" style="padding:10px; cursor:pointer;"><b>R$ ${v}</b><br><small style="color:#bc13fe;">Gems</small></div>`);
                });
            </script>
        </div>
        <div id="pix-area" style="display:none; margin-top: 20px;" class="glass border-green-600">
            <p style="color: #00ff00; font-size:9px; font-weight:bold;">CHAVE PIX PRESIDENTE:</p>
            <p style="font-size:10px; margin:10px 0; word-break: break-all;">0f549cdb-6acb-4af9-bd96-890360d4cdf8</p>
            <button onclick="window.open('https://wa.me/5567981251773')" class="bg-purple" style="background:white; color:black; font-size:10px;">PAGUEI! LIBERAR GEMS</button>
        </div>
    </div>

    <!-- TELA 5: GESTÃO -->
    <div id="tela-gestao" class="aba-conteudo">
        <h3 style="color:#666; font-size:9px;">ACESSO RESTRITO</h3>
        <input id="e-adm" type="email" placeholder="E-mail">
        <input id="s-adm" type="password" placeholder="Senha">
        <button onclick="logar()" class="bg-purple">ENTRAR NO PAINEL</button>
        
        <div id="painel" style="display:none; margin-top:20px; text-align: left;">
            <div class="glass" style="background:#bc13fe; padding:20px;">
                <p style="font-size:8px; font-weight:bold; opacity:0.7;">ESTOQUE DO PRESIDENTE</p>
                <h2 style="font-size:20px;">100.000.000 GEMS</h2>
            </div>
            <div class="glass">
                <input id="l-nick" type="text" placeholder="Apelido do Cliente">
                <input id="l-val" type="number" placeholder="Quantidade">
                <button onclick="alert('Gems Enviadas!')" class="bg-purple" style="background:#28a745;">LIBERAR E SALVAR</button>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div id="btn-home" onclick="mudarAba('home')" class="nav-tab nav-active">🏠<br>Feed</div>
        <div id="btn-roulette" onclick="mudarAba('roulette')" class="nav-tab">🎡<br>Sorte</div>
        <div id="btn-live" onclick="mudarAba('live')" class="nav-tab">🎥<br>Live</div>
        <div id="btn-gems" onclick="mudarAba('gems')" class="nav-tab">💎<br>Gems</div>
        <div id="btn-gestao" onclick="mudarAba('gestao')" class="nav-tab">👤<br>Gestão</div>
    </footer>

    <script>
        function logar() {
            if(document.getElementById('e-adm').value === "radamez1228@gmail.com") {
                document.getElementById('painel').style.display = 'block';
                document.getElementById('topo-saldo').innerText = "PRESIDENTE";
            }
        }
    </script>
</body>
</html>
