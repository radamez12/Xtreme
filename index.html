<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIXXX - Oficial</title>
    
    <!-- CSS INTEGRADO (PARA NÃO DEPENDER DE INTERNET LENTA) -->
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { padding: 15px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .neon-purple { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; font-weight: 900; italic: true; }
        .aba-conteudo { display: none; padding: 20px; text-align: center; }
        .aba-ativa { display: block !important; }
        footer { position: fixed; bottom: 0; width: 100%; max-width: 448px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; z-index: 1000; padding: 10px 0; }
        .nav-tab { color: #555; font-size: 10px; font-weight: bold; text-align: center; flex: 1; cursor: pointer; }
        .nav-active { color: #bc13fe !important; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .bg-purple { background: linear-gradient(90deg, #bc13fe, #8a2be2); color: white; border-radius: 15px; padding: 15px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        input { background: #111; border: 1px solid #333; color: white; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .wheel { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #bc13fe; margin: 20px auto; background: #111; display: flex; align-items: center; justify-content: center; font-size: 8px; opacity: 0.5; }
    </style>

    <!-- O SEGREDO: SCRIPT NO TOPO -->
    <script>
        function mudarAba(id) {
            // Esconde todas
            document.getElementById('tela-home').style.display = 'none';
            document.getElementById('tela-roulette').style.display = 'none';
            document.getElementById('tela-live').style.display = 'none';
            document.getElementById('tela-gems').style.display = 'none';
            document.getElementById('tela-gestao').style.display = 'none';

            // Desativa cores
            document.getElementById('btn-home').classList.remove('nav-active');
            document.getElementById('btn-roulette').classList.remove('nav-active');
            document.getElementById('btn-live').classList.remove('nav-active');
            document.getElementById('btn-gems').classList.remove('nav-active');
            document.getElementById('btn-gestao').classList.remove('nav-active');

            // Mostra a escolhida
            document.getElementById('tela-' + id).style.display = 'block';
            document.getElementById('btn-' + id).classList.add('nav-active');
        }
    </script>
</head>
<body class="max-w-md mx-auto min-h-screen">

    <header>
        <h1 class="text-2xl neon-purple italic">PIXXX</h1>
        <div style="color: #ffcc00; font-weight: bold; font-size: 12px;" id="topo-saldo">0 Gems</div>
    </header>

    <!-- TELA 1: HOME -->
    <div id="tela-home" class="aba-conteudo aba-ativa">
        <h3 style="font-size: 10px; color: #666; letter-spacing: 2px; margin-bottom: 20px;">DESTAQUES ONLINE</h3>
        <div class="glass" onclick="mudarAba('live')">
            <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=400" style="width:100%; border-radius:15px; opacity: 0.7;">
            <p style="margin-top:10px; font-weight: bold;">Mih_Vip 🔥</p>
        </div>
    </div>

    <!-- TELA 2: ROLETA -->
    <div id="tela-roulette" class="aba-conteudo">
        <h2 class="neon-purple" style="font-size: 20px;">ROLETA DA SORTE</h2>
        <div class="wheel">SORTE | 5 | 30 | 250 | 10</div>
        <button onclick="alert('Banca sem saldo para girar')" class="bg-purple">GIRAR (15 GEMS)</button>
    </div>

    <!-- TELA 3: LIVE -->
    <div id="tela-live" class="aba-conteudo">
        <div style="width:100%; height:300px; background:black; border:1px solid #333; border-radius:30px; overflow:hidden; margin-bottom:15px;">
            <div id="video-player" style="width:100%; height:100%;"></div>
        </div>
        <input id="nick" type="text" placeholder="Seu apelido...">
        <button onclick="alert('Abra a câmera')" class="bg-purple" style="margin-bottom:10px;">🎥 ABRIR CÂMERA</button>
        <button onclick="alert('Iniciando...')" style="width:100%; background:#222; color:white; border:1px solid #444; padding:15px; border-radius:15px; font-weight:bold;">ASSISTIR LIVE</button>
    </div>

    <!-- TELA 4: GEMS -->
    <div id="tela-gems" class="aba-conteudo">
        <h2 class="neon-purple">LOJA DE MOEDAS</h2>
        <div class="glass" onclick="document.getElementById('pix-area').style.display='block'">
            <p>110 GEMS</p>
            <p style="font-size:20px; font-weight:900;">R$ 100,00</p>
        </div>
        <div id="pix-area" style="display:none;" class="glass">
            <p style="color: #00ff00; font-size:10px;">CHAVE PIX PRESIDENTE:</p>
            <p style="font-size:12px; margin:10px 0;">0f549cdb-6acb-4af9-bd96-890360d4cdf8</p>
            <button onclick="window.open('https://wa.me/5567981251773')" class="bg-purple" style="background:white; color:black;">PAGUEI! LIBERAR</button>
        </div>
    </div>

    <!-- TELA 5: GESTÃO -->
    <div id="tela-gestao" class="aba-conteudo">
        <h3 style="color:#666; font-size:10px;">ACESSO RESTRITO</h3>
        <input id="e-adm" type="email" placeholder="E-mail">
        <input id="s-adm" type="password" placeholder="Senha">
        <button onclick="logar()" class="bg-purple">ENTRAR NO PAINEL</button>
        
        <div id="painel" style="display:none; margin-top:20px; text-align: left;">
            <div class="glass" style="background:#bc13fe;">
                <p style="font-size:10px;">ESTOQUE</p>
                <h2>100.000.000 GEMS</h2>
            </div>
        </div>
    </div>

    <!-- FOOTER NAVEGAÇÃO -->
    <footer>
        <div id="btn-home" onclick="mudarAba('home')" class="nav-tab nav-active">🏠<br>Início</div>
        <div id="btn-roulette" onclick="mudarAba('roulette')" class="nav-tab">🎡<br>Sorte</div>
        <div id="btn-live" onclick="mudarAba('live')" class="nav-tab">🎥<br>Live</div>
        <div id="btn-gems" onclick="mudarAba('gems')" class="nav-tab">💎<br>Gems</div>
        <div id="btn-gestao" onclick="mudarAba('gestao')" class="nav-tab">👤<br>Gestão</div>
    </footer>

    <script>
        function logar() {
            const e = document.getElementById('e-adm').value;
            const s = document.getElementById('s-adm').value;
            if(e === "radamez1228@gmail.com" && s === "Ra@$926629") {
                document.getElementById('painel').style.display = 'block';
                document.getElementById('topo-saldo').innerText = "PRESIDENTE";
            } else { alert("Dados incorretos"); }
        }
    </script>
</body>
</html>
