<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXXX - Sua Live, Seu Lucro</title>
    <!-- CSS para deixar o app bonito -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Motor da Câmera (Agora.io) -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .neon-purple { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; }
        .bg-purple { background-color: #bc13fe; }
        .video-box { width: 100%; height: 450px; background: #000; border: 2px solid #bc13fe; border-radius: 24px; overflow: hidden; position: relative; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen p-4 pb-24">

    <!-- Cabeçalho -->
    <header class="flex justify-between items-center py-4">
        <h1 class="text-3xl font-black italic neon-purple">PIXXX</h1>
        <div class="text-right">
            <p class="text-green-400 font-bold">0 Gems</p>
            <button class="bg-purple text-white text-[10px] px-2 py-1 rounded-full font-bold">RECARREGAR</button>
        </div>
    </header>

    <!-- Tela da Live -->
    <div id="video-container" class="video-box shadow-2xl shadow-purple-900/20">
        <div class="absolute top-4 left-4 bg-red-600 px-2 py-1 rounded text-[10px] font-bold z-10">AO VIVO</div>
        <div id="placeholder-text" class="absolute inset-0 flex items-center justify-center text-gray-600 text-sm text-center p-8">
            Aguardando início da transmissão...
        </div>
    </div>

    <!-- Campo do Token (Obrigatório porque você ativou o Certificado) -->
    <div class="mt-4">
        <label class="text-[10px] text-gray-400 uppercase font-bold">Token Temporário do Agora.io:</label>
        <input id="token-input" type="text" placeholder="Cole o código 007eJx... aqui" 
        class="w-full bg-gray-900 border border-gray-800 rounded-lg p-3 mt-1 text-xs text-purple-300 focus:outline-none focus:border-purple-500">
    </div>

    <!-- Botões de Ação -->
    <div class="grid grid-cols-2 gap-4 mt-6">
        <button onclick="iniciarLive()" class="bg-purple hover:opacity-80 text-white p-4 rounded-2xl font-bold uppercase text-xs transition-all">
            Abrir Câmera<br><span class="text-[9px] opacity-70">(Sou Modelo)</span>
        </button>
        <button onclick="entrarLive()" class="bg-gray-800 border border-purple text-white p-4 rounded-2xl font-bold uppercase text-xs transition-all">
            Assistir Live<br><span class="text-[9px] opacity-70">(Sou Usuário)</span>
        </button>
    </div>

    <!-- Painel de Ganhos da Modelo -->
    <div class="mt-8 bg-gray-900/50 p-5 rounded-3xl border border-gray-800">
        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Saldo Acumulado</p>
        <div class="flex justify-between items-center mt-1">
            <h2 class="text-3xl font-black text-white">R$ 0,00</h2>
            <button onclick="alert('O saque de R$ 30,00 estará disponível em breve com a Suitpay!')" 
            class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-extrabold transition-colors">
                SACAR PIX
            </button>
        </div>
        <p class="text-[9px] text-gray-600 mt-3 font-medium italic">* Mínimo para saque: R$ 30,00. Taxa da plataforma: 25%.</p>
    </div>

    <!-- Script de Funcionamento da Live -->
    <script>
        const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
        const appId = "39917ad3d16d40068600abe739047a15"; // Seu App ID já configurado
        const canal = "canal-pixxx"; // Nome do canal que você deve usar no site do Agora
        let localTracks = { videoTrack: null, audioTrack: null };

        async function iniciarLive() {
            const token = document.getElementById('token-input').value;
            if(!token) return alert("Por favor, gere e cole o TOKEN TEMPORÁRIO do site do Agora.io");

            try {
                client.setClientRole("host");
                await client.join(appId, canal, token, null);
                
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                
                document.getElementById('placeholder-text').style.display = 'none';
                localTracks.videoTrack.play("video-container");
                
                await client.publish(Object.values(localTracks));
                alert("SUA LIVE COMEÇOU! Você já pode receber presentes.");
            } catch (error) {
                console.error(error);
                alert("Erro ao iniciar live. Verifique se o Token é válido.");
            }
        }

        async function entrarLive() {
            const token = document.getElementById('token-input').value;
            if(!token) return alert("Por favor, cole o TOKEN para assistir a live.");

            try {
                client.setClientRole("audience");
                await client.join(appId, canal, token, null);
                
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('placeholder-text').style.display = 'none';
                        user.videoTrack.play("video-container");
                    }
                });
                alert("Você entrou na live! Envie presentes para a modelo.");
            } catch (error) {
                alert("Erro ao entrar na live. A modelo pode estar offline ou o token expirou.");
            }
        }
    </script>
</body>
</html>
