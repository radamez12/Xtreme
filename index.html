<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>

    <style>
        /* CSS ESSENCIAL (CARREGA NA HORA) */
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { padding: 15px; border-bottom: 1px solid #222; background: #000; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .neon { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; font-weight: 900; }
        .aba { display: none; padding: 20px; text-align: center; padding-bottom: 120px; }
        .aba-ativa { display: block !important; }
        footer { position: fixed; bottom: 0; width: 100%; max-width: 448px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; z-index: 999; padding: 10px 0; }
        .nav-tab { color: #444; font-size: 10px; font-weight: bold; text-align: center; flex: 1; cursor: pointer; }
        .nav-active { color: #bc13fe !important; border-top: 2px solid #bc13fe; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .bg-purple { background: linear-gradient(90deg, #bc13fe, #8a2be2); color: white; border-radius: 12px; padding: 15px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        input { background: #111; border: 1px solid #333; color: white; width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-game { background: #ff4500; }
        .blur-img { filter: blur(20px); opacity: 0.5; width: 100%; border-radius: 15px; }
        #v-player { width: 100%; height: 300px; background: #000; border-radius: 25px; border: 1px solid #bc13fe; overflow: hidden; }
    </style>

    <script>
        // NAVEGAÇÃO TURBO (NÃO TRAVA)
        function mudar(id) {
            const abas = ['home', 'sorte', 'live', 'gems', 'adm'];
            abas.forEach(a => {
                document.getElementById('t-' + a).style.display = 'none';
                document.getElementById('b-' + a).classList.remove('nav-active');
            });
            document.getElementById('t-' + id).style.display = 'block';
            document.getElementById('b-' + id).classList.add('nav-active');
            window.scrollTo(0,0);
        }
    </script>
</head>
<body class="max-w-md mx-auto">

            <button onclick="window.open('https://wa.me/5567981251773')" class="bg-purple" style="background:#fff; color:#000; margin-top:10px;">JÁ PAGUEI! LIBERAR</button>
        </div>
    </div>

    <!-- TELA 5: GESTÃO -->

    <!-- CARREGAMENTO PESADO NO FINAL (PARA NÃO TRAVAR) -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _URL = 'https://uwjbmxxehcxaow.supabase.co';
        const _KEY = 'sb_publishable_cvsGGsWffdopP6ooo3Vqjw_D71XLKft';
        const supabase = supabase.createClient(_URL, _KEY);
        const appId = "58b921e58ceb4536b3bca7dd6a12bdba";
        const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });

        // Gerar Loja
        const v = document.getElementById('vitrine');
        [5, 10, 15, 20, 25, 30, 50, 100].forEach(n => {
            v.innerHTML += `<div onclick="document.getElementById('pix-box').style.display='block'" class="glass" style="padding:10px; cursor:pointer;"><b>R$ ${n}</b><br><small style="color:#bc13fe">Gems</small></div>`;
        });

        function logar() {
            const u = document.getElementById('e').value;
            const p = document.getElementById('s').value;
            const vips = ["px_user_882", "br_vendas_99", "suporte_alpha", "master_px01", "tech_br_vagas"];
            if(u === "radamez1228@gmail.com" && p === "Ra@$926629") {
                document.getElementById('log-box').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                document.getElementById('s-topo').innerText = "PRESIDENTE";
            } else if(vips.includes(u) && p === "PIXXX2024") {
                document.getElementById('log-box').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                document.getElementById('est-val').innerText = "20.000 GEMS";
                document.getElementById('s-topo').innerText = "VENDEDOR";
            } else { alert("Acesso negado"); }
        }

        async function liberar() {
            const n = document.getElementById('l-nick').value;
            const q = document.getElementById('l-qtd').value;
            const { error } = await supabase.from('usuarios').upsert({ apelido: n, gems: q }, { onConflict: 'apelido' });
            if(!error) alert("SUCESSO!");
        }

        function girar() {
            const r = document.getElementById('roda');
            r.style.transform = `rotate(${Math.floor(Math.random()*360)+3600}deg)`;
            setTimeout(() => { alert("Você ganhou Gems! Chame o suporte para liberar."); }, 4000);
        }

        async function live(m) {
            await client.join(appId, "canal-pixxx", null, null);
            const a = await AgoraRTC.createMicrophoneAudioTrack();
            let v = m === 'camera' ? await AgoraRTC.createCameraVideoTrack() : await AgoraRTC.createScreenVideoTrack();
            v.play("v-player");
            await client.publish([a, v]);
            alert("AO VIVO!");
        }

        async function assistir() {
            await client.join(appId, "canal-pixxx", null, null);
            client.on("user-published", async (u, m) => {
                await client.subscribe(u, m);
                if(m === "video") u.videoTrack.play("v-player");
            });
        }
    </script>
